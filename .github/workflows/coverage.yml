name: Coverage Summary

on:
  pull_request:
    paths:
      - "control-plane/**"
      - "sdk/**"
      - "scripts/test-all.sh"
      - "scripts/coverage-summary.sh"
      - "scripts/coverage-gate.py"
      - ".coverage-gate.toml"
      - "coverage-baseline.json"
      - ".github/workflows/coverage.yml"
      - "docs/COVERAGE.md"
      - "docs/DEVELOPMENT.md"
      - ".github/BRANCH_PROTECTION.md"
  push:
    branches: [main]
    paths:
      - "control-plane/**"
      - "sdk/**"
      - "scripts/test-all.sh"
      - "scripts/coverage-summary.sh"
      - "scripts/coverage-gate.py"
      - ".coverage-gate.toml"
      - "coverage-baseline.json"
      - ".github/workflows/coverage.yml"
      - "docs/COVERAGE.md"
      - "docs/DEVELOPMENT.md"
      - ".github/BRANCH_PROTECTION.md"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python SDK test dependencies
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Install TypeScript SDK dependencies
        working-directory: sdk/typescript
        run: npm ci
        env:
          CI: true

      - name: Install control plane web UI dependencies
        working-directory: control-plane/web/client
        run: npm ci
        env:
          CI: true

      - name: Generate coverage summary
        run: ./scripts/coverage-summary.sh

      - name: Publish coverage summary
        run: cat test-reports/coverage/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Run coverage gate
        id: gate
        # Thresholds live in .coverage-gate.toml at the repo root so they
        # stay in-version-control and are the single source of truth for
        # both local runs and CI.
        run: |
          ./scripts/coverage-gate.py \
            --summary  test-reports/coverage/summary.json \
            --baseline coverage-baseline.json \
            --config   .coverage-gate.toml
        continue-on-error: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: test-reports/coverage/
          retention-days: 7

      - name: Comment coverage report on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-gate
          path: test-reports/coverage/gate-report.md

      - name: Fail the job if the gate failed
        if: steps.gate.outcome == 'failure'
        run: |
          echo "::error::Coverage gate failed. See the coverage report comment on the PR for details and remediation steps."
          exit 1

      - name: Update coverage badge gist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.COVERAGE_GIST_ID != '' && secrets.GIST_TOKEN != ''
        uses: actions/github-script@v7
        env:
          COVERAGE_GIST_ID: ${{ secrets.COVERAGE_GIST_ID }}
        with:
          github-token: ${{ secrets.GIST_TOKEN }}
          script: |
            const fs = require('fs');
            const badge = fs.readFileSync('test-reports/coverage/badge.json', 'utf8');
            const summary = fs.readFileSync('test-reports/coverage/summary.json', 'utf8');

            await github.rest.gists.update({
              gist_id: process.env.COVERAGE_GIST_ID,
              files: {
                'badge.json': { content: badge },
                'coverage-summary.json': { content: summary },
              },
            });
